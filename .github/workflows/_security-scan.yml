name: Security Scan

on:
  workflow_call:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies for SAST
        working-directory: src/backend
        run: pip install -e ".[dev]"

      - name: Run Bandit (Python SAST)
        working-directory: src/backend
        run: bandit -r src -ll -ii

      - name: Run Semgrep (JavaScript/TypeScript SAST)
        uses: docker://semgrep/semgrep:latest
        with:
          args: >
            semgrep scan
            --config p/javascript
            --config p/typescript
            --config p/react
            --config p/security-audit
            src/frontend src/backend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
