name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

permissions:
  contents: read

jobs:
  migrate-staging:
    runs-on: ubuntu-latest
    environment:
      name: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: src/backend
        run: pip install -r requirements.txt
      - name: Run migrations
        working-directory: src/backend
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: alembic upgrade head

  deploy-backend-staging:
    needs: [migrate-staging]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.vercel.outputs.preview-url }}
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy backend to Vercel Staging
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_BACKEND_STAGING }}
          working-directory: ./src/backend
          vercel-args: --prod

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json
      - working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.STAGING_API_URL || 'http://localhost:8000/api/v1' }}
        run: |
          npm ci
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: src/frontend/.next
          include-hidden-files: true

  deploy-frontend-staging:
    needs: [build-frontend]
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.vercel.outputs.preview-url }}
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: src/frontend/.next
      - name: Deploy frontend to Vercel Staging
        id: vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}
          working-directory: ./src/frontend
          vercel-args: --prod

  smoke-staging:
    needs: [deploy-backend-staging, deploy-frontend-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test staging
        env:
          BACKEND_URL: ${{ needs.deploy-backend-staging.outputs.preview-url }}
          FRONTEND_URL: ${{ needs.deploy-frontend-staging.outputs.preview-url }}
        run: |
          echo "Running smoke tests against staging..."
          curl --fail --retry 5 --retry-delay 10 "$BACKEND_URL/health"
          curl --fail --retry 5 --retry-delay 10 "$FRONTEND_URL"
