name: Rollback production backend

on:
  workflow_dispatch:
    inputs:
      release_index:
        description: "Release index to rollback to (1 = previous, 2 = before previous, etc.)"
        required: true
        default: "1"
      app_name:
        description: "Fly.io app name"
        required: true
        default: "elite-backend"

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5
      - name: Rollback to selected release
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          INDEX=${{ github.event.inputs.release_index }}
          echo "Rolling back to release index $INDEX..."
          PREV_IMAGE=$(python -c "import json,sys; print(json.load(sys.stdin)[$INDEX]['imageRef'])" <<< "$(fly releases list --app ${{ github.event.inputs.app_name }} --json)")
          echo "Target image: $PREV_IMAGE"
          flyctl deploy --app ${{ github.event.inputs.app_name }} --image "$PREV_IMAGE"
      - name: Verify rollback health
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -fsS --retry 10 --retry-delay 5 https://${{ github.event.inputs.app_name }}.fly.dev/health || exit 1
